site_name: THRD Protocol
site_description: Teahouse of Recollected Dreams 管理改革大纲与行动指南
theme:
  name: material
  logo: assets/logo.svg
  custom_dir: overrides
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.footer
    - content.code.copy

markdown_extensions:
  - admonition            # 支持提示框
  - md_in_html            # 允许在 HTML 里写 Markdown
  - attr_list             # 支持在 Markdown 元素上添加属性
  - pymdownx.details      # 支持可展开的细节块
  - pymdownx.superfences  # 支持在提示框里嵌套代码块
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai  # 强制使用北京时间
      locale: zh               # 日期格式本地化为中文

nav:
  - 入门:
    - 欢迎来到茶馆: index.md
    - 入馆指南: getting-started/onboarding.md
  - 愿景: proposal.md
  - 成员分类:
    - 角色定义: governance/maintainer-role.md
    - 权限管理: governance/access-control.md
    - 生命周期: governance/lifecycle.md
  - 行动指南:
    - 开发工作流: action-guide/dev-workflow.md
    - 决策流程: action-guide/decision-making.md
    - 沟通规范: action-guide/communication.md
    - 标签系统: action-guide/labels.md
  - 技能大纲:
    - 技术栈: skills/tech-stack.md
    - 文档标准: skills/docs-standard.md
  - 伦理与边界:
    - THRD 精神: ethics/thrd-spirit.md
    - 数据隐私: ethics/data-privacy.md
  - 关于: about.md
  - 变更记录: changelog.md