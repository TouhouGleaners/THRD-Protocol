site_name: THRD Protocol
site_description: Teahouse of Recollected Dreams 管理改革大纲与行动指南
theme:
  name: material
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition            # 支持提示框
  - pymdownx.details      # 支持可展开的细节块
  - pymdownx.superfences  # 支持在提示框里嵌套代码块

plugins:
  - search
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai  # 强制使用北京时间
      locale: zh               # 日期格式本地化为中文

nav:
  - 愿景: index.md
  - 治理逻辑:
    - 角色定义: governance/maintainer-role.md
    - 决策流程: governance/decision-making.md
    - 权限管理: governance/access-control.md
  - 行动指南:
    - 成员准入: action-guide/onboarding.md
    - 开发工作流: action-guide/dev-workflow.md
    - 故障复盘: action-guide/incident-report.md
    - 标签系统: action-guide/labels.md
  - 技能大纲:
    - 技术栈: skills/tech-stack.md
    - 文档标准: skills/docs-standard.md
    - 沟通规范: skills/communication.md
  - 伦理与边界:
    - 数据隐私: ethics/data-privacy.md
    - THRD 精神: ethics/thrd-spirit.md
  - 变更记录: changelog.md